<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VovaTube</title>
  <!-- Custom favicon from the same directory as index.html -->
  <link class="js-favicon" rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Firebase Compat SDKs for web app authentication & database storage -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* Reset and Top-Center Alignment */
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Aligned to the absolute top of the viewport */
    }

    /* Centered Wrapper for the entire UI */
    .main-wrapper {
      width: 100%;
      max-width: 850px; /* Compact width alignment */
      margin-top: 5px;  /* Small gap from top of viewport */
      padding: 0 10px;
    }

    /* Container for the header */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 0px; /* Reduced vertical padding */
      background-color: #ffffff;
    }

    /* Left Side: Logo */
    .logo-container {
      display: flex;
      align-items: center;
    }
    .logo-container a {
      display: block;
      text-decoration: none;
    }
    .logo-image {
      height: 48px; /* Logo size */
      object-fit: contain;
      display: block;
      border: 0;
    }

    /* Right Side Layout */
    .right-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px; /* Compact gap between links and search */
    }

    /* Top Row: Navigation Links */
    .links-row {
      font-size: 11px; /* Smaller retro text size */
      color: #000000;
      word-spacing: -0.5px;
    }
    .links-row a {
      color: #0033cc;
      text-decoration: underline;
      font-weight: normal;
    }
    .links-row a.primary-link {
      font-weight: bold;
    }
    .link-separator {
      color: #000000;
      margin: 0 3px;
      font-weight: normal;
    }

    /* Label Styling for the search form */
    .smallLabel {
      font-size: 11px;
      font-weight: bold;
      color: #000000;
    }

    /* Default form alignment */
    #searchForm {
      display: flex;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    /* Search input field adjusted to align its left edge slightly to the right of the "Sign Up" button */
    #searchField {
      width: 260px; 
    }

    /* Navigation Bar styling matching late 2006 YouTube with full-width scaling */
    #gNavDiv {
      display: flex;
      align-items: flex-end;
      margin-bottom: 0px; 
      padding-left: 0px;
      width: 100%; /* Ensure it spans the full width of the table */
    }

    /* Navigation tabs distribute evenly and sit perfectly flush with the subnav bar */
    .tab, .ltab, .rtab {
      display: block;
      flex: 1; /* Distribute tabs evenly across the entire bar width */
      margin-right: 8px; /* Gaps between buttons are a little smaller */
      margin-bottom: 0px; /* All tabs sit completely flush with the gray bar below */
    }

    .rtab {
      margin-right: 0; /* Remove gap on the final tab */
    }

    /* Classic Spiffy Corners Simulated CSS with Outlines Removed */
    .rc, .rcs {
      display: block;
      background: transparent;
      font-size: 1px;
    }
    .rc1, .rc2, .rc3, .rc4, .rc5,
    .rcs1, .rcs2, .rcs3, .rcs4, .rcs5 {
      display: block;
      overflow: hidden;
      height: 1px;
    }

    /* Unselected tabs (Classic Richer Pale Blue - Updated to #BBCCEE) */
    .rc1 { margin: 0 5px; background: #BBCCEE; }
    .rc2 { margin: 0 3px; border-left: 2px solid #BBCCEE; border-right: 2px solid #BBCCEE; background: #BBCCEE; }
    .rc3 { margin: 0 2px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    .rc4 { margin: 0 1px; height: 2px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    .rc5 { margin: 0 1px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    
    .tabContent {
      background: #BBCCEE;
      border-left: none; /* Removed border outlines */
      border-right: none; /* Removed border outlines */
      padding: 2px 11px 3px 11px; /* Unified padding to match the active tab exactly */
      font-size: 11px; /* Slightly smaller text for cleaner compact layout */
      font-weight: bold;
      text-align: center; /* Center-align link text inside the scaled-up tabs */
    }
    .tabContent a {
      color: #0033cc;
      text-decoration: underline; /* Always underlined */
    }
    .tabContent a:hover {
      text-decoration: underline;
    }

    /* Selected tab (Classic Darker Gray) */
    .rcs1 { margin: 0 5px; background: #dfdfdf; }
    .rcs2 { margin: 0 3px; border-left: 2px solid #dfdfdf; border-right: 2px solid #dfdfdf; background: #dfdfdf; }
    .rcs3 { margin: 0 2px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    .rcs4 { margin: 0 1px; height: 2px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    .rcs5 { margin: 0 1px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    
    .tabContent.selected {
      background: #dfdfdf;
      border-left: none; /* Removed border outlines */
      border-right: none; /* Removed border outlines */
      padding: 2px 11px 3px 11px; /* Keeps active and inactive tabs at the exact same height */
    }
    .tabContent.selected a {
      color: #0033cc; /* Selected page text highlighted in blue */
      text-decoration: underline; /* Always underlined */
    }

    /* Bottom Subnav Bar (Classic Darker Gray) with Border Outline Removed, Taller Height, and Centered Text */
    #gSubNavDiv {
      background-color: #dfdfdf;
      border: none; /* Removed border outlines */
      padding: 8px 10px; /* Made the bottom nav bar a bit taller */
      font-size: 11px;
      color: #000000;
      text-align: center; /* Centered the subnav buttons */
      min-height: 31px; /* Prevent bar collapse when empty */
    }
    #gSubNavDiv a {
      color: #0033cc;
      text-decoration: underline; /* Always underlined */
    }
    #gSubNavDiv a:hover {
      text-decoration: underline;
    }

    /* CSS Class to style the active sub-navigation page link as bold with the underline kept */
    #gSubNavDiv a.active-sub {
      font-weight: bold;
      text-decoration: underline;
      color: #0033cc;
    }

    /* Content Area directly below the header with zero top margin */
    #contentArea {
      margin-top: 0px;
    }
    #contentArea::after {
      content: "";
      display: table;
      clear: both;
    }

    #contentArea h1 {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
      color: #000000;
    }

    /* Homepage Layout Styles (Classic 2006 Left Side Highlight Box) */
    #hpMainContent {
      width: 65%;
      float: left;
      margin-top: 15px;
    }
    .headerRCBox {
      display: block;
    }
    .rch {
      display: block;
      background: transparent;
      font-size: 1px;
    }
    .rch1, .rch2, .rch3, .rch4, .rch5 {
      display: block;
      overflow: hidden;
      height: 1px;
    }
    
    /* Rounded corners header borders updated to match the #CCCCCC color */
    .rch1 { margin: 0 5px; background: #CCCCCC; }
    .rch2 { margin: 0 3px; border-left: 2px solid #CCCCCC; border-right: 2px solid #CCCCCC; background: #CCCCCC; }
    .rch3 { margin: 0 2px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    .rch4 { margin: 0 1px; height: 2px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    .rch5 { margin: 0 1px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    
    .headerRCBox .content {
      background: #CCCCCC;
      padding: 3px 10px; /* Reduced vertical padding from 4px to 3px to make the upper box sleeker */
    }
    .headerTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333333;
    }
    .headerTitle span {
      font-size: 15px; /* Made the Featured Videos text larger */
      font-weight: bold;
      color: #000000; /* Pure black text color */
    }
    .headerTitleRight {
      font-size: 11px;
    }
    .headerTitleRight a {
      color: #0033cc;
      font-weight: bold;
      text-decoration: underline;
    }
    .vListBox {
      border: 1px solid #CCCCCC;
      border-top: none;
      height: auto;
      background-color: #ffffff;
      padding: 10px;
    }
    .footerBox {
      border: 1px solid #CCCCCC;
      border-top: none;
      background-color: #CCCCCC; /* Matches header color */
      padding: 2px 3px 2px 10px; /* Reduced vertical padding to 2px so it is smaller than the upper box */
      margin-bottom: 20px;
      font-size: 10px; /* Reduced text size to 10px to make the bottom box clearly smaller than the upper one */
    }
    .footerBox a {
      color: #0033cc;
      font-weight: normal; /* Regular normal text */
      text-decoration: underline;
    }

    /* Mobile Responsive Tweaks */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .right-container {
        align-items: center;
      }
      #gNavDiv {
        flex-wrap: wrap;
        justify-content: center;
      }
      #gSubNavDiv {
        text-align: center;
        line-height: 1.8;
      }
      #hpMainContent {
        width: 100%;
        float: none;
      }
    }
  </style>
</head>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCI2nv6NIGU7P9n0cV5sMOvTHAcbDJurmQ",
      authDomain: "vovatube-41e7e.firebaseapp.com",
      projectId: "vovatube-41e7e",
      storageBucket: "vovatube-41e7e.firebasestorage.app",
      messagingSenderId: "988486339970",
      appId: "1:988486339970:web:3d2fbafbbe133b07da139b",
      measurementId: "G-H5576P4Q9W"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = "vovatube-41e7e";

    // Holds the captured inner HTML of the subnav element
    let originalSubNavHTML = '';

    // Updates tab active states dynamically
    function updateTabs(selectedTab) {
      const tabs = ['home', 'videos', 'channels', 'groups', 'categories', 'upload'];
      tabs.forEach(tab => {
        const tabEl = document.getElementById('tab-' + tab);
        if (!tabEl) return;
        
        const isSelected = (tab === selectedTab);
        const cornerBg = tabEl.querySelector('.corner-bg');
        const c1 = tabEl.querySelector('.c1');
        const c2 = tabEl.querySelector('.c2');
        const c3 = tabEl.querySelector('.c3');
        const c4 = tabEl.querySelector('.c4');
        const c5 = tabEl.querySelector('.c5');
        const content = tabEl.querySelector('.tabContent');
        
        if (isSelected) {
          if (cornerBg) cornerBg.className = 'corner-bg rcs';
          if (c1) { c1.className = 'c1 rcs1'; c1.innerHTML = '<b></b>'; }
          if (c2) { c2.className = 'c2 rcs2'; c2.innerHTML = '<b></b>'; }
          if (c3) c3.className = 'c3 rcs3';
          if (c4) c4.className = 'c4 rcs4';
          if (c5) c5.className = 'c5 rcs5';
          if (content) content.classList.add('selected');
        } else {
          if (cornerBg) cornerBg.className = 'corner-bg rc';
          if (c1) { c1.className = 'c1 rc1'; c1.innerHTML = '<b></b>'; }
          if (c2) { c2.className = 'c2 rc2'; c2.innerHTML = '<b></b>'; }
          if (c3) c3.className = 'c3 rc3';
          if (c4) c4.className = 'c4 rc4';
          if (c5) c5.className = 'c5 rc5';
          if (content) content.classList.remove('selected');
        }
      });
    }

    // Handles the Dynamic Auth UI State Update in the top header links row (accepts manual override username to bypass Firebase sync lag)
    function updateHeaderUI(user, overrideName) {
      const headerLinksRow = document.getElementById('headerLinksRow');
      if (!headerLinksRow) return;

      if (user) {
        // User logged in: Shows bold "Hello," followed by username, log-in and sign-up are removed.
        const displayName = overrideName || user.displayName || "User";
        headerLinksRow.innerHTML = `
          <strong>Hello,</strong> ${displayName}
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('myaccount', event)">My Account</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('viewinghistory', event)">Viewing History</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('help', event)">Help</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="handleLogout(event)">Log Out</a>
        `;
      } else {
        // User is logged out: Restore regular links
        headerLinksRow.innerHTML = `
          <a href="#" class="primary-link" onclick="navigateTo('signup', event)">Sign Up</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('myaccount', event)">My Account</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('viewinghistory', event)">Viewing History</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('help', event)">Help</a>
          <span class="link-separator">|</span>
          <a href="#" onclick="navigateTo('login', event)">Log In</a>
        `;
      }
    }

    // Dynamic state listener for Firebase user session state
    auth.onAuthStateChanged((user) => {
      updateHeaderUI(user);
    });

    // Handles user signup process through Firebase Email/Password Authentication & saves profile info in Firestore
    window.handleSignUpSubmit = function(event) {
      event.preventDefault();

      const form = event.target;
      const email = form.email.value;
      const username = form.username.value;
      const password = form.password.value;
      const confirmPassword = form.confirm_password.value;
      const country = form.country.value;
      const gender = form.gender.value;
      const birthday_mon = form.birthday_mon.value;
      const birthday_day = form.birthday_day.value;
      const birthday_yr = form.birthday_yr.value;

      const feedback = document.getElementById('signupFeedback');
      if (feedback) feedback.innerText = "";

      // Validate Country Selection
      if (country === "---" || !country) {
        if (feedback) feedback.innerText = "Please select a valid country.";
        return;
      }

      // Validate Gender Selection
      if (!gender) {
        if (feedback) feedback.innerText = "Please select your gender.";
        return;
      }

      // Validate Date of Birth Selection
      if (birthday_mon === "---" || birthday_day === "---" || birthday_yr === "---" || !birthday_mon || !birthday_day || !birthday_yr) {
        if (feedback) feedback.innerText = "Please select a valid month, day, and year for your birth date.";
        return;
      }

      // Validate Password Match
      if (password !== confirmPassword) {
        if (feedback) feedback.innerText = "Passwords do not match!";
        return;
      }

      // Create Firebase Auth credentials
      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          // Set user's username as display name inside Firebase Profile update
          return user.updateProfile({
            displayName: username
          }).then(() => user);
        })
        .then((user) => {
          // Rule 1 Private Data Path: /artifacts/{appId}/users/{userId}/{collectionName}
          return db.collection('artifacts').doc(appId)
            .collection('users').doc(user.uid)
            .collection('profile').doc('details').set({
              username: username,
              email: email,
              country: country,
              gender: gender,
              birthMonth: birthday_mon,
              birthDay: birthday_day,
              birthYear: birthday_yr,
              signupTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => user);
        })
        .then((user) => {
          // Instantly force UI update with the new username to prevent delay
          updateHeaderUI(user, username);
          // Navigate to Home upon successful account setup
          navigateTo('home');
        })
        .catch((error) => {
          if (feedback) {
            feedback.innerText = "Error creating account: " + error.message;
          }
        });
    };

    // Handles user login submission
    window.handleLoginSubmit = function(event) {
      event.preventDefault();

      const form = event.target;
      const email = form.email.value;
      const password = form.password.value;
      const feedback = document.getElementById('loginFeedback');
      if (feedback) feedback.innerText = "";

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          // Instantly update UI with user info upon success
          updateHeaderUI(userCredential.user);
          navigateTo('home');
        })
        .catch((error) => {
          if (feedback) {
            feedback.innerText = "Error logging in: " + error.message;
          }
        });
    };

    // Log Out functionality helper
    window.handleLogout = function(event) {
      if (event) event.preventDefault();
      auth.signOut()
        .then(() => {
          navigateTo('home');
        })
        .catch((error) => {
          console.error("Error logging out:", error);
        });
    };

    // Interactive Router simulation
    function navigateTo(page, event) {
      if (event) {
        event.preventDefault();
      }

      const contentArea = document.getElementById('contentArea');
      const subNavDiv = document.getElementById('gSubNavDiv');

      // Lazily capture original subnav HTML on first call
      if (!originalSubNavHTML) {
