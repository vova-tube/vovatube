<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Header Recreation</title>
  <!-- Custom favicon from the same directory as index.html -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Reset and Top-Center Alignment */
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Aligned to the absolute top of the viewport */
    }

    /* Centered Wrapper for the entire UI */
    .main-wrapper {
      width: 100%;
      max-width: 850px; /* Compact width alignment */
      margin-top: 5px;  /* Small gap from top of viewport */
      padding: 0 10px;
    }

    /* Container for the header */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px 0px; /* Reduced vertical padding */
      background-color: #ffffff;
    }

    /* Left Side: Logo */
    .logo-container {
      display: flex;
      align-items: center;
    }
    .logo-container a {
      display: block;
      text-decoration: none;
    }
    .logo-image {
      height: 48px; /* Logo size */
      object-fit: contain;
      display: block;
      border: 0;
    }

    /* Right Side Layout */
    .right-container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px; /* Compact gap between links and search */
    }

    /* Top Row: Navigation Links */
    .links-row {
      font-size: 11px; /* Smaller retro text size */
      color: #000000;
      word-spacing: -0.5px;
    }
    .links-row a {
      color: #0033cc;
      text-decoration: underline;
      font-weight: normal;
    }
    .links-row a.primary-link {
      font-weight: bold;
    }
    .link-separator {
      color: #000000;
      margin: 0 3px;
      font-weight: normal;
    }

    /* Label Styling for the search form */
    .smallLabel {
      font-size: 11px;
      font-weight: bold;
      color: #000000;
    }

    /* Default form alignment */
    #searchForm {
      display: flex;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    /* Search input field adjusted to align its left edge slightly to the right of the "Sign Up" button */
    #searchField {
      width: 260px; 
    }

    /* Navigation Bar styling matching late 2006 YouTube with full-width scaling */
    #gNavDiv {
      display: flex;
      align-items: flex-end;
      margin-bottom: 0px; 
      padding-left: 0px;
      width: 100%; /* Ensure it spans the full width of the table */
    }

    /* Navigation tabs distribute evenly and sit perfectly flush with the subnav bar */
    .tab, .ltab, .rtab {
      display: block;
      flex: 1; /* Distribute tabs evenly across the entire bar width */
      margin-right: 8px; /* Gaps between buttons are a little smaller */
      margin-bottom: 0px; /* All tabs sit completely flush with the gray bar below */
    }

    .rtab {
      margin-right: 0; /* Remove gap on the final tab */
    }

    /* Classic Spiffy Corners Simulated CSS with Outlines Removed */
    .rc, .rcs {
      display: block;
      background: transparent;
      font-size: 1px;
    }
    .rc1, .rc2, .rc3, .rc4, .rc5,
    .rcs1, .rcs2, .rcs3, .rcs4, .rcs5 {
      display: block;
      overflow: hidden;
      height: 1px;
    }

    /* Unselected tabs (Classic Richer Pale Blue - Updated to #BBCCEE) */
    .rc1 { margin: 0 5px; background: #BBCCEE; }
    .rc2 { margin: 0 3px; border-left: 2px solid #BBCCEE; border-right: 2px solid #BBCCEE; background: #BBCCEE; }
    .rc3 { margin: 0 2px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    .rc4 { margin: 0 1px; height: 2px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    .rc5 { margin: 0 1px; border-left: 1px solid #BBCCEE; border-right: 1px solid #BBCCEE; background: #BBCCEE; }
    
    .tabContent {
      background: #BBCCEE;
      border-left: none; /* Removed border outlines */
      border-right: none; /* Removed border outlines */
      padding: 2px 11px 3px 11px; /* Unified padding to match the active tab exactly */
      font-size: 11px; /* Slightly smaller text for cleaner compact layout */
      font-weight: bold;
      text-align: center; /* Center-align link text inside the scaled-up tabs */
    }
    .tabContent a {
      color: #0033cc;
      text-decoration: underline; /* Always underlined */
    }
    .tabContent a:hover {
      text-decoration: underline;
    }

    /* Selected tab (Classic Darker Gray) */
    .rcs1 { margin: 0 5px; background: #dfdfdf; }
    .rcs2 { margin: 0 3px; border-left: 2px solid #dfdfdf; border-right: 2px solid #dfdfdf; background: #dfdfdf; }
    .rcs3 { margin: 0 2px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    .rcs4 { margin: 0 1px; height: 2px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    .rcs5 { margin: 0 1px; border-left: 1px solid #dfdfdf; border-right: 1px solid #dfdfdf; background: #dfdfdf; }
    
    .tabContent.selected {
      background: #dfdfdf;
      border-left: none; /* Removed border outlines */
      border-right: none; /* Removed border outlines */
      padding: 2px 11px 3px 11px; /* Keeps active and inactive tabs at the exact same height */
    }
    .tabContent.selected a {
      color: #0033cc; /* Selected page text highlighted in blue */
      text-decoration: underline; /* Always underlined */
    }

    /* Bottom Subnav Bar (Classic Darker Gray) with Border Outline Removed, Taller Height, and Centered Text */
    #gSubNavDiv {
      background-color: #dfdfdf;
      border: none; /* Removed border outlines */
      padding: 8px 10px; /* Made the bottom nav bar a bit taller */
      font-size: 11px;
      color: #000000;
      text-align: center; /* Centered the subnav buttons */
      min-height: 31px; /* Prevent bar collapse when empty */
    }
    #gSubNavDiv a {
      color: #0033cc;
      text-decoration: underline; /* Always underlined */
    }
    #gSubNavDiv a:hover {
      text-decoration: underline;
    }

    /* CSS Class to style the active sub-navigation page link as bold with the underline kept */
    #gSubNavDiv a.active-sub {
      font-weight: bold;
      text-decoration: underline;
      color: #0033cc;
    }

    /* Content Area directly below the header with zero top margin */
    #contentArea {
      margin-top: 0px;
    }
    #contentArea::after {
      content: "";
      display: table;
      clear: both;
    }

    #contentArea h1 {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
      color: #000000;
    }

    /* Homepage Layout Styles (Classic 2006 Left Side Highlight Box) */
    #hpMainContent {
      width: 65%;
      float: left;
      margin-top: 15px;
    }
    .headerRCBox {
      display: block;
    }
    .rch {
      display: block;
      background: transparent;
      font-size: 1px;
    }
    .rch1, .rch2, .rch3, .rch4, .rch5 {
      display: block;
      overflow: hidden;
      height: 1px;
    }
    
    /* Rounded corners header borders updated to match the #CCCCCC color */
    .rch1 { margin: 0 5px; background: #CCCCCC; }
    .rch2 { margin: 0 3px; border-left: 2px solid #CCCCCC; border-right: 2px solid #CCCCCC; background: #CCCCCC; }
    .rch3 { margin: 0 2px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    .rch4 { margin: 0 1px; height: 2px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    .rch5 { margin: 0 1px; border-left: 1px solid #CCCCCC; border-right: 1px solid #CCCCCC; background: #CCCCCC; }
    
    .headerRCBox .content {
      background: #CCCCCC;
      padding: 3px 10px; /* Reduced vertical padding from 4px to 3px to make the upper box sleeker */
    }
    .headerTitle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333333;
    }
    .headerTitle span {
      font-size: 15px; /* Made the Featured Videos text larger */
      font-weight: bold;
      color: #000000; /* Pure black text color */
    }
    .headerTitleRight {
      font-size: 11px;
    }
    .headerTitleRight a {
      color: #0033cc;
      font-weight: bold;
      text-decoration: underline;
    }
    .vListBox {
      border: 1px solid #CCCCCC;
      border-top: none;
      height: auto;
      background-color: #ffffff;
      padding: 10px;
    }
    .footerBox {
      border: 1px solid #CCCCCC;
      border-top: none;
      background-color: #CCCCCC; /* Matches header color */
      padding: 2px 3px 2px 10px; /* Reduced vertical padding to 2px so it is smaller than the upper box */
      margin-bottom: 20px;
      font-size: 10px; /* Reduced text size to 10px to make the bottom box clearly smaller than the upper one */
    }
    .footerBox a {
      color: #0033cc;
      font-weight: normal; /* Regular normal text */
      text-decoration: underline;
    }

    /* Mobile Responsive Tweaks */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .right-container {
        align-items: center;
      }
      #gNavDiv {
        flex-wrap: wrap;
        justify-content: center;
      }
      #gSubNavDiv {
        text-align: center;
        line-height: 1.8;
      }
      #hpMainContent {
        width: 100%;
        float: none;
      }
    }
  </style>
</head>
<body>

  <!-- Firebase Scripts Core SDK Initialization & Reachability Check -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCI2nv6NIGU7P9n0cV5sMOvTHAcbDJurmQ",
      authDomain: "vovatube-41e7e.firebaseapp.com",
      projectId: "vovatube-41e7e",
      storageBucket: "vovatube-41e7e.firebasestorage.app",
      messagingSenderId: "988486339970",
      appId: "1:988486339970:web:3d2fbafbbe133b07da139b",
      measurementId: "G-H5576P4Q9W"
    };

    const logoImg = document.getElementById("logoImg");

    async function checkFirebaseConnectivity() {
      try {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Define a 5-second timeout for the connection verification
        const timeoutPromise = new Promise((_, reject) => 
          setTimeout(() => reject(new Error("Connection timed out")), 5000)
        );

        // Rule 3: Auth Before Queries - authenticate anonymously
        const authPromise = signInAnonymously(auth);
        await Promise.race([authPromise, timeoutPromise]);

        // Query a dummy node to verify reachability
        const dummyDocRef = doc(db, 'artifacts', 'vovatube-41e7e', 'public', 'data', 'connectivityCheck', 'status');
        const readPromise = getDoc(dummyDocRef);
        await Promise.race([readPromise, timeoutPromise]);

        // Database successfully reached
        logoImg.src = "asset/vovatubebetafulllogo.png";
      } catch (error) {
        // Fallback to offline logo if database is unreachable or configuration fails
        logoImg.src = "asset/firebasedownfulllogo.png";
      }
    }

    checkFirebaseConnectivity();
  </script>

  <script>
    // Holds the captured inner HTML of the subnav element
    let originalSubNavHTML = '';

    // Updates tab active states dynamically
    function updateTabs(selectedTab) {
      const tabs = ['home', 'videos', 'channels', 'groups', 'categories', 'upload'];
      tabs.forEach(tab => {
        const tabEl = document.getElementById('tab-' + tab);
        if (!tabEl) return;
        
        const isSelected = (tab === selectedTab);
        const cornerBg = tabEl.querySelector('.corner-bg');
        const c1 = tabEl.querySelector('.c1');
        const c2 = tabEl.querySelector('.c2');
        const c3 = tabEl.querySelector('.c3');
        const c4 = tabEl.querySelector('.c4');
        const c5 = tabEl.querySelector('.c5');
        const content = tabEl.querySelector('.tabContent');
        
        if (isSelected) {
          if (cornerBg) cornerBg.className = 'corner-bg rcs';
          if (c1) { c1.className = 'c1 rcs1'; c1.innerHTML = '<b></b>'; }
          if (c2) { c2.className = 'c2 rcs2'; c2.innerHTML = '<b></b>'; }
          if (c3) c3.className = 'c3 rcs3';
          if (c4) c4.className = 'c4 rcs4';
          if (c5) c5.className = 'c5 rcs5';
          if (content) content.classList.add('selected');
        } else {
          if (cornerBg) cornerBg.className = 'corner-bg rc';
          if (c1) { c1.className = 'c1 rc1'; c1.innerHTML = '<b></b>'; }
          if (c2) { c2.className = 'c2 rc2'; c2.innerHTML = '<b></b>'; }
          if (c3) c3.className = 'c3 rc3';
          if (c4) c4.className = 'c4 rc4';
          if (c5) c5.className = 'c5 rc5';
          if (content) content.classList.remove('selected');
        }
      });
    }

    // Interactive Router simulation
    function navigateTo(page, event) {
      if (event) {
        event.preventDefault();
      }

      const contentArea = document.getElementById('contentArea');
      const subNavDiv = document.getElementById('gSubNavDiv');

      // Lazily capture original subnav HTML on first call
      if (!originalSubNavHTML) {
        originalSubNavHTML = subNavDiv.innerHTML;
      }
      
      // Group of pages which must output raw "404" with default browser serif font
      const errorPages = [
        'myaccount', 
        'viewinghistory', 
        'myfavorites', 
        'myfriends', 
        'myinbox', 
        'mysubscriptions', 
        'mygroups', 
        'mychannel',
        'groups',
        'categories'
      ];

      // List of sub-navigation pages
      const subNavPages = [
        'myaccount',
        'myvideos',
        'myfavorites',
        'myfriends',
        'myinbox',
        'mysubscriptions',
        'mygroups',
        'mychannel'
      ];

      // Handle the state of the sub navigation bar buttons
      if (page === 'upload') {
        // Just make it a plain gray strip by setting it to a non-breaking space
        subNavDiv.innerHTML = '&nbsp;';
      } else {
        // Restore buttons if they were removed
        if (subNavDiv.innerHTML !== originalSubNavHTML) {
          subNavDiv.innerHTML = originalSubNavHTML;
        }
      }

      // Reset active bold class on all sub-navigation bar links (only query if elements exist)
      const subNavLinks = document.querySelectorAll('#gSubNavDiv a');
      subNavLinks.forEach(link => {
        link.classList.remove('active-sub');
      });

      // Handle page rendering
      if (errorPages.includes(page)) {
        // Renders "404" in the default browser serif/Times New Roman font
        contentArea.innerHTML = '<span style="font-family: \'Times New Roman\', Times, serif;">404</span>';
      } else if (page === 'help') {
        // Renders just the header "Help Center"
        contentArea.innerHTML = '<h1>Help Center</h1>';
      } else if (page === 'home') {
        // Renders the exact requested HTML structure with updated elements order and style
        contentArea.innerHTML = `
<div id="hpMainContent">
 

		<div class="headerRCBox">
	<b class="rch">
	<b class="rch1"><b></b></b>
	<b class="rch2"><b></b></b>
	<b class="rch3"></b>
	<b class="rch4"></b>
	<b class="rch5"></b>
	</b> <div class="content">		<div class="headerTitle">
			<span>Featured Videos</span>
			<div class="headerTitleRight">
				<a href="#" onclick="navigateTo('videos', event)">See More Videos</a>
			</div>
		</div>
</div>
	</div>

	<div class="vListBox"></div> <!-- end vListBox -->
	<div class="footerBox">
		<div style="padding: 3px 0px; text-align: right;"><a href="#" onclick="navigateTo('videos', event)">See More Videos</a></div>
	</div>
</div>
        `;
      } else {
        contentArea.innerHTML = ''; // Blank pages
      }

      // Handle active tab state on the rounded corner navigation bar
      const mainTabs = ['home', 'videos', 'channels', 'groups', 'categories', 'upload'];
      
      if (subNavPages.includes(page)) {
        // Dynamically add bold styling to the selected sub-navigation item
        subNavLinks.forEach(link => {
          const onclickAttr = link.getAttribute('onclick');
          if (onclickAttr && onclickAttr.includes(`'${page}'`)) {
            link.classList.add('active-sub');
          }
        });
        
        // Keep "Home" rounded tab highlighted as active even though we are on a subnav page
        updateTabs('home');
      } else if (mainTabs.includes(page)) {
        updateTabs(page);
      } else {
        updateTabs(null); // Deselect rounded tabs for utility actions (Sign Up, Log In, etc.)
      }
    }

    // Default to 'home' view upon launching
    window.onload = function() {
      navigateTo('home');
    }
  </script>

</body>
</html>
